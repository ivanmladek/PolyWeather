global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - polyweather_alertmanager:9093

scrape_configs:
  - job_name: polyweather-web
    metrics_path: /metrics
    static_configs:
      - targets:
          - polyweather_web:8000
